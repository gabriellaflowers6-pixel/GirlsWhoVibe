<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girls Who Vibe | Build What You Wish Existed</title>
    <meta name="description" content="GWV is where girls build what they wish existed. Not for grades. Not for approval. For impact and ownership.">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- React 18 + Babel Standalone -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --deep-purple: #1a0a2e;
            --mid-purple: #2d1b4e;
            --light-purple: #7b4f9e;
            --bright-purple: #9b6fc0;
            --warm-gold: #d4a853;
            --bright-gold: #e8c875;
            --silver: #c0c0c0;
            --bright-silver: #d4d4d4;
            --terracotta: #c44d3f;
            --cream: #f5f0e8;
            --near-black: #0d0a12;
            --soft-pink: #d4729e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Work Sans', sans-serif;
        }

        .font-mono {
            font-family: 'DM Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--deep-purple);
            color: var(--cream);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--mid-purple); }
        ::-webkit-scrollbar-thumb { background: var(--light-purple); border-radius: 3px; }

        /* ========== ANIMATIONS ========== */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.35; }
            50% { transform: translateY(-25px) rotate(3deg); opacity: 0.55; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 168, 83, 0.2), 0 0 40px rgba(192, 192, 192, 0.1); }
            50% { box-shadow: 0 0 30px rgba(212, 168, 83, 0.4), 0 0 60px rgba(192, 192, 192, 0.2); }
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes underlineShimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }

        /* ========== SCROLL REVEAL ========== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-scale.visible { opacity: 1; transform: scale(1); }

        .reveal-left {
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal-left.visible { opacity: 1; transform: translateX(0); }

        @media (prefers-reduced-motion: reduce) {
            .reveal, .reveal-scale, .reveal-left {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ========== NAV ========== */
        .nav-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 10, 46, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(123, 79, 158, 0.2);
        }

        .nav-link {
            color: var(--cream);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: none;
            border: none;
        }
        .nav-link:hover { color: var(--warm-gold); background: rgba(212, 168, 83, 0.08); }
        .nav-link.active { color: var(--warm-gold); }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            z-index: 1100;
            background: none;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--cream);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: rgba(26, 10, 46, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1050;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        .mobile-menu.open { transform: translateX(0); }
        .mobile-menu a, .mobile-menu button.mobile-nav-link {
            color: var(--cream);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.75rem 2rem;
            transition: color 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .mobile-menu a:hover, .mobile-menu button.mobile-nav-link:hover { color: var(--warm-gold); }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .desktop-nav { display: none !important; }
        }

        @media (max-width: 640px) {
            .grid-2col { grid-template-columns: 1fr !important; }
            .grid-3col { grid-template-columns: 1fr !important; }
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            background: linear-gradient(135deg, var(--warm-gold), var(--bright-gold));
            color: var(--deep-purple);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s ease;
        }
        .btn-primary:hover::after { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 168, 83, 0.4), 0 0 12px rgba(192, 192, 192, 0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--warm-gold);
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--warm-gold);
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(212, 168, 83, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(212, 168, 83, 0.2);
        }

        /* ========== HERO ========== */
        .hero-bg {
            background: radial-gradient(ellipse at center, rgba(82, 28, 154, 0.78) 0%, rgba(48, 18, 86, 0.84) 60%, rgba(20, 8, 38, 0.90) 100%),
                        url('hero-bg.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        .floating-word {
            position: absolute;
            font-family: 'DM Mono', monospace;
            color: var(--light-purple);
            font-weight: 300;
            pointer-events: none;
            user-select: none;
        }

        .scroll-arrow {
            animation: bounceDown 2s ease-in-out infinite;
            cursor: pointer;
        }

        /* ========== SECTION DIVIDER ========== */
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--warm-gold), var(--silver), var(--warm-gold), transparent);
            opacity: 0.4;
        }

        /* ========== SPEECH BUBBLES ========== */
        .speech-bubble-container {
            display: flex;
            gap: 2rem;
            max-width: 700px;
            margin: 0 auto;
            align-items: flex-start;
        }
        @media (max-width: 640px) {
            .speech-bubble-container { flex-direction: column; gap: 1.5rem; }
        }
        .speech-bubble-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .speech-bubble {
            position: relative;
            background: rgba(123, 79, 158, 0.18);
            border: 1px solid rgba(123, 79, 158, 0.35);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--cream);
            font-style: italic;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid rgba(123, 79, 158, 0.35);
        }
        .speech-girl {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .speech-girl-1 {
            background: linear-gradient(135deg, rgba(212, 114, 158, 0.25), rgba(123, 79, 158, 0.3));
            border: 1.5px solid rgba(212, 114, 158, 0.4);
        }
        .speech-girl-2 {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.2), rgba(123, 79, 158, 0.3));
            border: 1.5px solid rgba(212, 168, 83, 0.4);
        }

        /* ========== FLIP CARDS ========== */
        .flip-card {
            perspective: 1000px;
            cursor: pointer;
            min-height: 380px;
        }
        @media (max-width: 640px) {
            .flip-card { min-height: 340px; }
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: inherit;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: inherit;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
        }
        .flip-card-front {
            background: linear-gradient(135deg, rgba(123, 79, 158, 0.2) 0%, rgba(45, 27, 78, 0.4) 100%);
            border: 1px solid rgba(123, 79, 158, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .flip-card:not(.flipped) .flip-card-front:hover {
            border-color: var(--warm-gold);
            box-shadow: 0 8px 32px rgba(212, 168, 83, 0.15), 0 0 8px rgba(192, 192, 192, 0.1);
        }
        .flip-card-back {
            background: linear-gradient(135deg, rgba(45, 27, 78, 0.95) 0%, rgba(26, 10, 46, 0.98) 100%);
            border: 1px solid var(--warm-gold);
            transform: rotateY(180deg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .flip-hint {
            font-size: 0.8rem;
            color: var(--warm-gold);
            margin-top: 1rem;
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .flow-arrow {
            color: var(--warm-gold);
            font-size: 1.2rem;
            margin: 0.4rem 0;
            text-align: center;
        }

        .flow-step {
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .flow-frustration {
            background: rgba(196, 77, 63, 0.15);
            border-left: 3px solid var(--terracotta);
        }
        .flow-notice {
            background: rgba(123, 79, 158, 0.15);
            border-left: 3px solid var(--bright-purple);
        }
        .flow-build {
            background: rgba(212, 168, 83, 0.15);
            border-left: 3px solid var(--warm-gold);
        }

        /* ========== SPARKLE ON FLIP ========== */
        .sparkle-container { position: relative; }
        .sparkle-container::before,
        .sparkle-container::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
        .flip-card.flipped .sparkle-container::before {
            background: var(--warm-gold);
            top: 10%;
            right: 10%;
            animation: sparkle 0.6s ease-out 0.2s forwards;
        }
        .flip-card.flipped .sparkle-container::after {
            background: var(--silver);
            bottom: 15%;
            left: 8%;
            animation: sparkle 0.6s ease-out 0.4s forwards;
        }

        /* ========== EVENT CARDS ========== */
        .event-card {
            background: linear-gradient(135deg, rgba(123, 79, 158, 0.12) 0%, rgba(45, 27, 78, 0.3) 100%);
            border: 1px solid rgba(123, 79, 158, 0.3);
            border-radius: 12px;
            padding: 1.75rem;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .event-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 168, 83, 0.4);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        }

        .event-card-featured {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.08) 0%, rgba(45, 27, 78, 0.4) 100%);
            border: 2px solid rgba(212, 168, 83, 0.5);
            border-radius: 16px;
            padding: 2.5rem;
            position: relative;
            transition: all 0.3s ease;
            animation: pulseGlow 4s ease-in-out infinite;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .event-card-featured:hover {
            transform: translateY(-6px);
            border-color: var(--warm-gold);
        }

        .event-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .badge-gold { background: var(--warm-gold); color: var(--deep-purple); }
        .badge-terracotta { background: var(--terracotta); color: var(--cream); }

        .event-tag {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            font-family: 'DM Mono', monospace;
            background: rgba(123, 79, 158, 0.25);
            color: var(--bright-purple);
            border: 1px solid rgba(123, 79, 158, 0.4);
        }

        .flagship-badge {
            position: absolute;
            top: -1px;
            right: 24px;
            background: linear-gradient(135deg, var(--warm-gold), var(--bright-gold));
            color: var(--deep-purple);
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 0.4rem 1rem;
            border-radius: 0 0 8px 8px;
        }

        /* ========== GLASS CARD ========== */
        .glass-card {
            background: rgba(45, 27, 78, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(123, 79, 158, 0.25);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(212, 168, 83, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* ========== OUTCOME BLOCKS ========== */
        .outcome-block {
            position: relative;
            padding: 2rem;
            padding-left: 2.5rem;
            border-left: 2px solid rgba(212, 168, 83, 0.3);
            transition: all 0.3s ease;
        }
        .outcome-block:hover {
            border-left-color: var(--warm-gold);
            background: rgba(212, 168, 83, 0.03);
        }
        .outcome-number {
            position: absolute;
            top: 0.5rem;
            right: 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: var(--warm-gold);
            opacity: 0.08;
            line-height: 1;
            pointer-events: none;
        }

        /* ========== SHIMMER UNDERLINE ========== */
        .shimmer-underline {
            position: relative;
            display: inline-block;
        }
        .shimmer-underline::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--warm-gold), var(--silver), var(--bright-gold), var(--silver), var(--warm-gold));
            background-size: 200% 100%;
            animation: underlineShimmer 3s linear infinite;
            border-radius: 2px;
        }

        /* ========== ACCENT BORDER BLOCK ========== */
        .accent-block {
            border-left: 3px solid;
            border-image: linear-gradient(to bottom, var(--warm-gold), var(--silver)) 1;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* ========== TUTORIAL PLACEHOLDER ========== */
        .tutorial-placeholder {
            background: rgba(123, 79, 158, 0.08);
            border: 2px dashed rgba(123, 79, 158, 0.3);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            color: var(--light-purple);
        }

        /* ========== CONTAINER ========== */
        .container-max {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========== FOCUS STATES ========== */
        *:focus-visible {
            outline: 2px solid var(--warm-gold);
            outline-offset: 2px;
        }

        /* ========== SKIP LINK ========== */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--warm-gold);
            color: var(--deep-purple);
            padding: 8px 16px;
            z-index: 2000;
            font-weight: 600;
            transition: top 0.3s;
            text-decoration: none;
        }
        .skip-link:focus { top: 0; }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // ========== SCROLL REVEAL HOOK ==========
        function useScrollReveal(threshold = 0.15) {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold, rootMargin: '0px 0px -40px 0px' }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        }

        // ========== REVEAL WRAPPER ==========
        function Reveal({ children, className = '', delay = 0, type = 'up' }) {
            const [ref, isVisible] = useScrollReveal();
            const baseClass = type === 'scale' ? 'reveal-scale' : type === 'left' ? 'reveal-left' : 'reveal';
            const delayClass = delay > 0 ? 'reveal-delay-' + delay : '';

            return (
                <div ref={ref} className={baseClass + ' ' + delayClass + ' ' + (isVisible ? 'visible' : '') + ' ' + className}>
                    {children}
                </div>
            );
        }

        // ========== DATA ==========
        const flipCards = [
            {
                front: { title: 'See something broken? Build the fix.', subtitle: "See something that could be better at school? In your community? Don't just wish it were different. Build an app that changes it." },
                back: {
                    frustration: { label: 'THE IDEA', text: '"I wish my school had a better way to find tutors."' },
                    notice: { label: 'DESIGN IT', text: 'What would a peer tutoring app actually need? Who would use it?' },
                    build: { label: 'BUILD IT', text: 'A peer tutoring matcher that connects students by subject, schedule, and learning style.' }
                }
            },
            {
                front: { title: 'Wish organizing your life was easier?', subtitle: 'Create a tool that works the way your brain works. Your planner, your rules, your design.' },
                back: {
                    frustration: { label: 'THE IDEA', text: '"None of these apps actually help me stay organized."' },
                    notice: { label: 'DESIGN IT', text: 'What do I actually need to track? What would make it easy?' },
                    build: { label: 'BUILD IT', text: 'A custom planner app with reminders, goals, and a dashboard that actually makes sense to you.' }
                }
            },
            {
                front: { title: 'Care about an issue? Design a solution.', subtitle: "Climate, mental health, equity, whatever matters to you, technology can help you make an impact." },
                back: {
                    frustration: { label: 'THE IDEA', text: '"I care about this issue but I feel like I can\'t do anything."' },
                    notice: { label: 'DESIGN IT', text: 'What would actually help people in my community right now?' },
                    build: { label: 'BUILD IT', text: 'A resource finder, awareness campaign site, or community action tool, designed by you, for your community.' }
